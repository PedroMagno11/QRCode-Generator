<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de QR Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Gerador de QR Code</h1>
      <p class="subtitle">Cole um link e gere o QR Code na hora.</p>

      <form id="qrForm" class="form">
        <label for="urlInput">Link</label>
        <input
          id="urlInput"
          name="url"
          type="text"
          placeholder="Ex: https://meusite.com"
          autocomplete="off"
          required
        />
        <button type="submit">Gerar QR Code</button>
      </form>

      <p id="message" class="message"></p>

      <section id="result" class="result hidden">
        <p><strong>Link final:</strong> <span id="finalUrl"></span></p>
        <img id="qrImage" alt="QR Code gerado" />
        <a id="downloadBtn" class="download-btn" download="qrcode.png">Baixar PNG</a>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
